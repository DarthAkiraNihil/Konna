name: Publish to Maven Central

on:
    push:
        tags:
            - 'v*.*.*'
        branches:
            - master
            - 'patch-*.*.*'

jobs:
    build:
        runs-on: ubuntu-latest
        
        steps:
            -   uses: actions/checkout@v2
            -   name: Set up JDK 21
                uses: actions/setup-java@v2
                with:
                    java-version: '21'
                    distribution: 'temurin'
            -   name: Build and publish with Gradle
                uses: gradle/actions/setup-gradle@v3
                with:
                    arguments: --no-daemon jreleaserConfig --git-root-search build test publish copyJar createBundle
                env:
                    JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
                    JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
                    JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME }}
                    JRELEASER_MAVENCENTRAL_TOKEN: ${{ secrets.JRELEASER_MAVENCENTRAL_SONATYPE_TOKEN }}
                    JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
            
            -   name: Release with gradle
                uses: gradle/actions/setup-gradle@v3
                with:
                    arguments: --no-daemon --stacktrace jreleaserFullRelease --git-root-search
                env:
                    JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
                    JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
                    JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME }}
                    JRELEASER_MAVENCENTRAL_TOKEN: ${{ secrets.JRELEASER_MAVENCENTRAL_SONATYPE_TOKEN }}
                    JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
            -   name: Create Github Release
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # The default token provided by GitHub Actions
                    TAG: ${{ github.ref_name }} # The name of the tag (e.g., v1.0.0)
                run: |
                    gh release create "$TAG" \
                        **/Konna.bundle-*.jar
                        --repo="$GITHUB_REPOSITORY" \
                        --title="${GITHUB_REPOSITORY#*/} $TAG" \
                        --generate-notes